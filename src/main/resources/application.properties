spring.application.name=videojuegos-back

spring.datasource.url=jdbc:postgresql://localhost:${DB_PORT:5433}/${DB_NAME:videojuegos}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET:cambia-este-secreto-por-uno-largo-y-aleatorio-en-produccion-1234567890}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

rawg.api.base-url=https://api.rawg.io/api
rawg.api.key=${RAWG_API_KEY:}

server.port=${SERVER_PORT:8080}
