services:
  postgres:
    image: postgres:16-alpine
    container_name: videojuegos-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: videojuegos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - videojuegos-db-data:/var/lib/postgresql/data

volumes:
  videojuegos-db-data:
